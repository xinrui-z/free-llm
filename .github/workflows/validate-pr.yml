name: Validate PR

on:
  pull_request:
    paths:
      - 'site/src/data/providers.json'
      - 'site/src/data/changelog.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate providers.json and changelog.json
        run: node scripts/validate.mjs
